<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFダウンロード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 { color: #2c3e50; }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .file-icon {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
        }
        .file-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }
        .download-btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: #e74c3c; /* PDFをイメージした赤 */
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
        }
        .download-btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        .hint {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>資料ダウンロード</h1>

    <div class="container">
        <div class="file-icon">📄</div>
        <div class="file-name">test.pdf</div>
        
        <a href="images/test.pdf" download="test.pdf" class="download-btn">
            PDFをダウンロード
        </a>
        
        <p class="hint">クリックするとファイルを保存、またはブラウザで表示します。</p>
    </div>

</body>
</html>
